<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nurse</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-bg);
            padding: 40px 16px;
            position: relative;
        }
        .auth-card {
            background: var(--card-bg);
            padding: 48px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-top: 40px;
        }
        .remember-forgot-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .auth-link {
            color: var(--primary-accent);
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .auth-link:hover {
            color: var(--highlight-accent);
        }
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 20px;
                margin-top: 60px;
            }
            .remember-forgot-row {
                flex-direction: row;
                align-items: center;
                gap: 8px;
            }
            .remember-forgot-row label, .remember-forgot-row a {
                font-size: 13px !important;
            }
            .fixed-toggles {
                top: 16px !important;
                right: 16px !important;
            }
        }
    </style>
</head>
<body>

    <div class="auth-page">
        <div class="fixed-toggles" style="position: absolute; top: 24px; right: 24px; display: flex; gap: 12px; z-index: 1000;">
            <button id="themeToggle" class="action-icon" aria-label="Toggle Dark Mode">🌙</button>
            <button id="rtlToggle" class="action-icon" aria-label="Toggle RTL">⇄</button>
        </div>
        <div class="auth-card fade-up">
            <div class="text-center mb-4">
                <a href="index.html" class="nav-brand" style="justify-content: center; margin-bottom: 24px;">
                    <div class="nav-brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-top: 2px;"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
                    </div>
                    <span style="font-size: 24px;">Nurse</span>
                </a>
                <h2>Welcome Back</h2>
                <p class="subheading" style="margin-bottom: 0;">Log in to access your study portal and metrics dashboard.</p>
            </div>
            
            <form action="dashboard.html">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" class="form-control" id="passwordInput" placeholder="••••••••" required style="padding-right: 48px; width: 100%;">
                        <button type="button" onclick="var p=document.getElementById('passwordInput'); p.type = (p.type === 'password') ? 'text' : 'password';" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; padding: 0; z-index: 10;">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group remember-forgot-row">
                    <label style="display: flex; align-items: center; gap: 8px; margin: 0; font-weight: 400; cursor: pointer;">
                        <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--primary-accent);">
                        Remember me
                    </label>
                    <a href="#" class="auth-link" style="font-size: 14px;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 24px;">Log In</button>
                
                <div style="text-align: center; position: relative; margin-bottom: 24px;">
                    <hr style="border-color: var(--border-color); opacity: 0.5;">
                    <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 0 16px; color: var(--text-secondary); font-size: 14px;">OR</span>
                </div>
                
                <button type="button" class="btn btn-secondary" style="width: 100%; margin-bottom: 16px; display: flex; gap: 12px; justify-content: center; align-items: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
                <button type="button" class="btn btn-secondary" style="width: 100%; display: flex; gap: 12px; justify-content: center; align-items: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                      <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.15 2.65.72 3.4 1.8-3.12 1.87-2.65 5.92.48 7.18-.74 1.8-1.58 3.5-2.53 4.03zM12.03 7.25c-.15-3.22 2.6-5.83 5.67-6.05.33 3.26-2.82 5.95-5.67 6.05z"/>
                    </svg>
                    Continue with Apple
                </button>
                
                <p class="text-center mt-4" style="color: var(--text-secondary);">
                    Don't have an account? <a href="register.html" class="auth-link">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
